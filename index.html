<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D'WALI - Digital Wali</title>

    <!-- Tailwind + DaisyUI + Alpine.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dwali-dark': '#0f3d2e',
                        'dwali-green': '#166534',
                        'dwali-light': '#a7f3d0',
                        'dwali-yellow': '#facc15',
                        'dwali-red': '#ef4444',
                        'dwali-success': '#22c55e',
                    },
                    fontFamily: { 'jakarta': ['Plus Jakarta Sans', 'sans-serif'] }
                }
            }
        };
    </script>

    <style>
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        body {
            background-color: #0f3d2e;
            background-image: url('https://images.unsplash.com/photo-1497486751825-1233686d5d80?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glass-dark {
            background: rgba(15, 61, 46, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .chat-bubble-bot {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border-radius: 16px 16px 16px 4px;
        }
        .chat-bubble-user {
            background: #facc15;
            color: #0f3d2e;
            border-radius: 16px 16px 4px 16px;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: #a7f3d0;
            border-radius: 10px;
        }
        
        /* LOADING ANIMATION */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #facc15;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        /* Progress bar loading */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 12px;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #facc15, #a7f3d0);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>

<body>

    <div x-data="dwaliApp()" x-init="init()" class="min-h-screen flex flex-col text-white">

        <!-- HEADER -->
        <header class="glass-dark px-4 py-3 flex items-center justify-between sticky top-0 z-40 shadow-lg">
            <div class="flex items-center gap-2 cursor-pointer" @click="goHome()">
                <svg class="h-7 w-7 text-dwali-yellow" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
                </svg>
                <h1 class="text-xl md:text-2xl font-extrabold tracking-wide">D'WALI</h1>
            </div>
            <div x-show="currentUser" class="flex items-center gap-3">
                <div class="text-right text-sm hidden sm:block">
                    <p class="font-bold" x-text="currentUser?.name"></p>
                    <p class="text-xs text-dwali-light" x-text="currentUser?.role === 'admin' ? 'Wali Kelas' : 'Siswa - ' + currentUser?.class"></p>
                </div>
                <button @click="logout()" class="btn btn-xs sm:btn-sm btn-error btn-outline text-white border-white/20">Logout</button>
            </div>
        </header>

        <!-- MAIN -->
        <main class="flex-1 p-4 md:p-8 max-w-5xl mx-auto w-full">

            <!-- LOADING dengan Progress -->
            <div x-show="isLoading" class="flex flex-col items-center justify-center min-h-[60vh]">
                <div class="spinner"></div>
                <p class="text-dwali-light mt-4 text-sm" x-text="loadingMessage"></p>
                <div class="progress-bar w-64">
                    <div class="fill" :style="'width: ' + loadingProgress + '%'"></div>
                </div>
                <p class="text-xs text-dwali-light/50 mt-2" x-text="loadingProgress + '%'"></p>
            </div>

            <!-- ============ LOGIN ============ -->
            <template x-if="view === 'login' && !isLoading">
                <div class="flex items-center justify-center min-h-[80vh] fade-in">
                    <div class="glass p-8 rounded-3xl w-full max-w-md text-center shadow-2xl">
                        <h2 class="text-3xl font-extrabold mb-2">Selamat Datang</h2>
                        <p class="text-dwali-light mb-6">Silakan masuk untuk melanjutkan</p>
                        <div class="flex flex-col gap-3">
                            <button @click="navigateTo('student-login')" class="btn btn-block text-white border-dwali-light bg-dwali-green hover:bg-dwali-dark">Login sebagai Siswa</button>
                            <button @click="navigateTo('admin-login')" class="btn btn-block text-dwali-dark bg-dwali-yellow hover:bg-yellow-400 border-yellow-400">Login sebagai Wali Kelas</button>
                        </div>
                        <div class="mt-6 text-xs text-dwali-light/70">
                            <p class="font-bold text-dwali-yellow">🔑 Akun Demo:</p>
                            <p>Siswa: Ahmad Fauzi | Kelas: 7A | Pass: siswa123</p>
                            <p>Wali: admin@dwali.com | Pass: admin123</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ STUDENT LOGIN ============ -->
            <template x-if="view === 'student-login' && !isLoading">
                <div class="flex items-center justify-center min-h-[80vh] fade-in">
                    <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
                        <h2 class="text-2xl font-bold mb-4 text-center">Login Siswa</h2>
                        <form @submit.prevent="studentLogin()" class="space-y-4">
                            <input type="text" x-model="loginForm.name" placeholder="Nama Siswa" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required />
                            <input type="text" x-model="loginForm.class" placeholder="Kelas (cth: 7A)" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required />
                            <input type="password" x-model="loginForm.password" placeholder="Password" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required />
                            <button type="submit" class="btn btn-block bg-dwali-yellow text-dwali-dark border-none hover:bg-yellow-400">Masuk</button>
                            <button type="button" @click="navigateTo('login')" class="text-xs text-dwali-light hover:underline w-full">&larr; Kembali</button>
                        </form>
                        <div class="mt-4 text-xs text-dwali-light/70 text-center">
                            <p class="font-bold text-dwali-yellow">📝 Contoh Akun:</p>
                            <p>Ahmad Fauzi, Budi Santoso, Citra Dewi, dll</p>
                            <p>Kelas: 7A | Password: siswa123</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ ADMIN LOGIN ============ -->
            <template x-if="view === 'admin-login' && !isLoading">
                <div class="flex items-center justify-center min-h-[80vh] fade-in">
                    <div class="glass p-8 rounded-3xl w-full max-w-md shadow-2xl">
                        <h2 class="text-2xl font-bold mb-4 text-center">Login Wali Kelas</h2>
                        <form @submit.prevent="adminLogin()" class="space-y-4">
                            <input type="email" x-model="loginForm.email" placeholder="Email Wali" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required />
                            <input type="password" x-model="loginForm.password" placeholder="Password" class="input input-bordered w-full bg-white/20 text-white placeholder-gray-300 border-white/30" required />
                            <button type="submit" class="btn btn-block bg-dwali-yellow text-dwali-dark border-none hover:bg-yellow-400">Masuk</button>
                            <button type="button" @click="navigateTo('login')" class="text-xs text-dwali-light hover:underline w-full">&larr; Kembali</button>
                        </form>
                        <div class="mt-4 text-xs text-dwali-light/70 text-center">
                            <p class="font-bold text-dwali-yellow">📝 Contoh Akun:</p>
                            <p>Email: admin@dwali.com | Pass: admin123</p>
                            <p>Email: wali@dwali.com | Pass: wali123</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ STUDENT: PETA POTENSI ============ -->
            <template x-if="currentUser?.role === 'student' && !currentUser.is_potensi_filled && view === 'student-dashboard' && !isLoading">
                <div class="glass p-6 rounded-3xl max-w-2xl mx-auto fade-in">
                    <h2 class="text-2xl font-bold mb-2">Peta Potensi Siswa 🗺️</h2>
                    <p class="text-dwali-light mb-6">Lengkapi data berikut 1 kali saja. Ini akan membantu walimu memahamimu lebih baik.</p>
                    <div class="space-y-4">
                        <div>
                            <label class="label text-white">Minat</label>
                            <select x-model="potensiForm.minat" class="select select-bordered w-full bg-white/20 border-white/30">
                                <option class="bg-dwali-dark" value="Olahraga">Olahraga</option>
                                <option class="bg-dwali-dark" value="Seni">Seni</option>
                                <option class="bg-dwali-dark" value="Sains">Sains</option>
                                <option class="bg-dwali-dark" value="Teknologi">Teknologi</option>
                                <option class="bg-dwali-dark" value="Bahasa">Bahasa</option>
                                <option class="bg-dwali-dark" value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div>
                            <label class="label text-white">Gaya Belajar</label>
                            <select x-model="potensiForm.gaya_belajar" class="select select-bordered w-full bg-white/20 border-white/30">
                                <option class="bg-dwali-dark" value="Visual">Visual</option>
                                <option class="bg-dwali-dark" value="Auditori">Auditori</option>
                                <option class="bg-dwali-dark" value="Kinestetik">Kinestetik</option>
                                <option class="bg-dwali-dark" value="Baca/Tulis">Baca/Tulis</option>
                            </select>
                        </div>
                        <div>
                            <label class="label text-white">Cita-cita</label>
                            <textarea x-model="potensiForm.cita_cita" class="textarea textarea-bordered w-full bg-white/20 border-white/30" placeholder="Aku ingin menjadi..."></textarea>
                        </div>
                        <div>
                            <label class="label text-white">Kekuatan Karakter</label>
                            <select x-model="potensiForm.kekuatan_karakter" class="select select-bordered w-full bg-white/20 border-white/30">
                                <option class="bg-dwali-dark" value="Pemberani">Pemberani</option>
                                <option class="bg-dwali-dark" value="Baik Hati">Baik Hati</option>
                                <option class="bg-dwali-dark" value="Kreatif">Kreatif</option>
                                <option class="bg-dwali-dark" value="Pantang Menyerah">Pantang Menyerah</option>
                                <option class="bg-dwali-dark" value="Disiplin">Disiplin</option>
                                <option class="bg-dwali-dark" value="Pemimpin">Pemimpin</option>
                                <option class="bg-dwali-dark" value="Jujur">Jujur</option>
                            </select>
                        </div>
                        <div>
                            <label class="label text-white">Ekstrakurikuler</label>
                            <input type="text" x-model="potensiForm.ekstrakurikuler" class="input input-bordered w-full bg-white/20 border-white/30" placeholder="cth: Pramuka, Futsal" />
                        </div>
                        <button @click="savePotensi()" class="btn btn-block bg-dwali-success text-white border-none hover:bg-green-600 mt-4">Simpan Peta Potensi</button>
                    </div>
                </div>
            </template>

            <!-- ============ STUDENT DASHBOARD ============ -->
            <template x-if="currentUser?.role === 'student' && currentUser.is_potensi_filled && view === 'student-dashboard' && !isLoading">
                <div class="space-y-6 fade-in">
                    <div class="glass p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold">Halo, <span x-text="currentUser.name"></span>! 👋</h2>
                            <p class="text-dwali-light">Kelas <span x-text="currentUser.class"></span></p>
                        </div>
                        <div class="mt-4 md:mt-0 text-center glass-dark p-3 rounded-xl">
                            <p class="text-xs text-dwali-light">Status Peta Potensi</p>
                            <p class="font-bold text-dwali-success">✅ Sudah Diisi</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div @click="openGoodAction()" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center">
                            <div class="text-5xl mb-2">⭐</div>
                            <p class="font-bold">Perbuatan Baik</p>
                            <p class="text-xs text-dwali-light" x-text="hasDoneGoodToday() ? '✔️ Sudah isi hari ini' : 'Klik untuk isi'"></p>
                        </div>
                        <div @click="navigateTo('student-jurnal')" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center">
                            <div class="text-5xl mb-2">📔</div>
                            <p class="font-bold">Jurnal Harian</p>
                            <p class="text-xs text-dwali-light">Ceritakan harimu</p>
                        </div>
                        <div @click="navigateTo('student-curhat')" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center col-span-2">
                            <div class="text-5xl mb-2">💬</div>
                            <p class="font-bold">Kontak Curhat</p>
                            <p class="text-xs text-dwali-light">Ada keluhan atau cerita? Sampaikan ke walimu.</p>
                        </div>
                        <div @click="navigateTo('student-riwayat')" class="glass p-6 rounded-3xl flex flex-col items-center justify-center cursor-pointer hover:scale-105 transition-transform text-center col-span-2">
                            <div class="text-5xl mb-2">📬</div>
                            <p class="font-bold">Riwayat Curhatku</p>
                            <p class="text-xs text-dwali-light">Cek balasan dari wali</p>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ MODAL PERBUATAN BAIK ============ -->
            <template x-if="modalGoodAction">
                <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" @click.self="modalGoodAction=false">
                    <div class="glass-dark p-6 rounded-3xl w-full max-w-md fade-in">
                        <h3 class="text-xl font-bold mb-4 text-center">Pilih Perbuatan Baikmu 🌟</h3>
                        <div class="space-y-2">
                            <template x-for="act in goodActions">
                                <button @click="submitGoodAction(act)" class="btn btn-block glass text-white hover:bg-dwali-green border-none justify-start text-left">
                                    <span x-text="act"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ STUDENT: JURNAL ============ -->
            <template x-if="view === 'student-jurnal' && !isLoading">
                <div class="space-y-4 fade-in">
                    <button @click="goBack()" class="text-dwali-light hover:underline">&larr; Kembali</button>
                    <div class="glass p-6 rounded-3xl">
                        <h2 class="text-2xl font-bold mb-4">Jurnal Harian 📔</h2>
                        <label class="label text-white">Bagaimana perasaanmu hari ini?</label>
                        <div class="flex gap-2 mb-4 text-4xl">
                            <template x-for="m in ['😊','😐','😢','😡','😴']">
                                <button @click="jurnalForm.perasaan = m" :class="jurnalForm.perasaan === m ? 'bg-dwali-yellow scale-110' : 'bg-white/20'" class="p-2 rounded-xl transition-transform">
                                    <span x-text="m"></span>
                                </button>
                            </template>
                        </div>
                        <label class="label text-white">Ceritakan harimu...</label>
                        <textarea x-model="jurnalForm.cerita" class="textarea textarea-bordered w-full bg-white/20 border-white/30 mb-4" rows="4"></textarea>
                        <button @click="saveJurnal()" class="btn btn-block bg-dwali-success text-white border-none">Simpan Jurnal</button>
                    </div>
                    <div class="glass p-6 rounded-3xl">
                        <h3 class="font-bold mb-3">Riwayat Jurnal</h3>
                        <div class="space-y-3 max-h-96 overflow-y-auto">
                            <template x-for="jrn in getMyJurnals()">
                                <div class="bg-white/10 p-3 rounded-xl">
                                    <div class="flex justify-between text-xs text-dwali-light mb-1">
                                        <span x-text="formatDate(jrn.date)"></span>
                                        <span x-text="jrn.perasaan"></span>
                                    </div>
                                    <p x-text="jrn.cerita" class="text-sm"></p>
                                </div>
                            </template>
                            <div x-show="getMyJurnals().length === 0" class="text-center text-dwali-light py-4">Belum ada jurnal.</div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- ============ STUDENT: CURHAT ============ -->
            <template x-if="view === 'student-curhat' && !isLoading">
                <div class="space-y-4 fade-in">
                    <button @click="goBack()" class="text-dwali-light hover:underline">&larr; Kembali</button>
                    <div class="glass p-6 rounded-3xl min-h-[60vh] flex flex-col">
                        <h2 class="text-xl font-bold mb-4 text-center">Kontak Curhat 💬</h2>
                        <div class="flex-1 space-y-3 overflow-y-auto mb-4">
                            <div class="chat chat-start">
                                <div class="chat-bubble-bot chat-bubble">Halo, aku di sini untuk mendengarkan. Siapakah kamu?</div>
                            </div>
                            <template x-if="curhatForm.untuk_siapa">
                                <div class="chat chat-end"><div class="chat-bubble-user chat-bubble" x-text="curhatForm.untuk_siapa"></div></div>
                            </template>
                            <template x-if="curhatForm.untuk_siapa && !curhatForm.kategori">
                                <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble">Kategori, apakah ini masalah di rumah atau di sekolah?</div></div>
                            </template>
                            <template x-if="curhatForm.kategori">
                                <div class="chat chat-end"><div class="chat-bubble-user chat-bubble" x-text="curhatForm.kategori"></div></div>
                            </template>
                            <template x-if="curhatForm.kategori && !curhatForm.sub_kategori">
                                <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble" x-text="curhatForm.kategori === 'Rumah' ? 'Masalah di rumah?' : 'Masalah di sekolah?'"></div></div>
                            </template>
                            <template x-if="curhatForm.sub_kategori">
                                <div class="chat chat-end"><div class="chat-bubble-user chat-bubble" x-text="curhatForm.sub_kategori"></div></div>
                            </template>
                            <template x-if="curhatForm.sub_kategori && !curhatForm.tingkat_darurat">
                                <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble">Tingkat Darurat?</div></div>
                            </template>
                            <template x-if="curhatForm.tingkat_darurat">
                                <div class="chat chat-end"><div class="chat-bubble-user chat-bubble" x-text="curhatForm.tingkat_darurat"></div></div>
                            </template>
                            <template x-if="curhatForm.tingkat_darurat && !curhatForm.cerita">
                                <div class="chat chat-start"><div class="chat-bubble-bot chat-bubble">Masalahnya apa? Ceritakan bebas ya.</div></div>
                            </template>
                            <template x-if="curhatForm.tingkat_darurat === 'Aku butuh bantuan sekarang'">
                                <div class="chat chat-start">
                                    <div class="chat-bubble bg-dwali-red/80 chat-bubble">⚠️ Kami akan segera menghubungimu! Tetap tenang ya.</div>
                                </div>
                            </template>
                        </div>

                        <div class="border-t border-white/20 pt-4">
                            <template x-if="!curhatForm.untuk_siapa">
                                <div class="flex gap-2 justify-center flex-wrap">
                                    <button @click="setCurhat('untuk_siapa','Aku sendiri')" class="btn btn-sm bg-dwali-yellow text-dwali-dark">Aku sendiri</button>
                                    <button @click="setCurhat('untuk_siapa','Aku curhat untuk temanku')" class="btn btn-sm bg-dwali-light text-dwali-dark">Curhat untuk temanku</button>
                                </div>
                            </template>
                            <template x-if="curhatForm.untuk_siapa && !curhatForm.kategori">
                                <div class="flex gap-2 justify-center">
                                    <button @click="setCurhat('kategori','Rumah')" class="btn btn-sm bg-dwali-yellow text-dwali-dark">Rumah</button>
                                    <button @click="setCurhat('kategori','Sekolah')" class="btn btn-sm bg-dwali-light text-dwali-dark">Sekolah</button>
                                </div>
                            </template>
                            <template x-if="curhatForm.kategori === 'Rumah' && !curhatForm.sub_kategori">
                                <div class="flex gap-2 justify-center flex-wrap">
                                    <button @click="setCurhat('sub_kategori','Orang tua')" class="btn btn-sm glass text-white">Orang tua</button>
                                    <button @click="setCurhat('sub_kategori','Saudara')" class="btn btn-sm glass text-white">Saudara</button>

    <script>
        // ============================================================
        // KONFIGURASI API Google Apps Script
        // GANTI URL_INI dengan deployment URL Anda
        // ============================================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbyOR1N6rti1N5iMUGLFJOKRH7uRU4oBcDDdunhajL3RWhapsBgOZ2PkcbicgAZExaYf/exec';

        // ============================================================
        // API CALL dengan timeout dan retry
        // ============================================================
        async function callAPI(action, data = {}, retries = 2) {
            let lastError;
            for (let i = 0; i < retries; i++) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 detik timeout
                    
                    const url = `${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`;
                    console.log(`📤 API Call (attempt ${i+1}):`, action, data);
                    
                    const res = await fetch(url, {
                        method: 'GET',
                        mode: 'cors',
                        headers: { 'Accept': 'application/json' },
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    console.log('📥 API Response:', json);
                    
                    if (!json.success) throw new Error(json.error || 'Gagal memuat data');
                    return json.data;
                } catch (e) {
                    lastError = e;
                    console.warn(`⚠️ Attempt ${i+1} failed:`, e.message);
                    if (i < retries - 1) {
                        await new Promise(r => setTimeout(r, 1000 * (i + 1))); // Exponential backoff
                    }
                }
            }
            throw lastError || new Error('Gagal terhubung ke server');
        }

        // ============================================================
        // ALPINE APP
        // ============================================================
        function dwaliApp() {
            return {
                // State
                view: 'login',
                currentUser: null,
                loginForm: { name: '', class: '', email: '', password: '' },
                isLoading: false,
                loadingMessage: 'Memuat data...',
                loadingProgress: 0,
                navHistory: [],

                // Cache data
                cachedStudents: [],
                cachedCurhats: [],
                cachedJurnals: [],
                cachedPotensi: [],
                cachedPerbuatanBaik: [],

                // Forms
                potensiForm: { minat: 'Olahraga', gaya_belajar: 'Visual', cita_cita: '', kekuatan_karakter: 'Pemberani',
                    ekstrakurikuler: '' },
                jurnalForm: { perasaan: '', cerita: '' },
                curhatForm: { untuk_siapa: '', kategori: '', sub_kategori: '', tingkat_darurat: '', cerita: '' },
                tempCerita: '',
                modalGoodAction: false,
                goodActions: ['Aku membantu teman', 'Aku berbagi makanan', 'Aku menjaga kebersihan', 'Aku berkata jujur',
                    'Lainnya'
                ],
                newStudent: { name: '', nis: '' },
                replyText: {},
                laporanForm: {},
                toast: { show: false, msg: '' },

                // ------------------------------------------------------
                // INIT
                // ------------------------------------------------------
                init() {
                    // Browser back/forward
                    window.addEventListener('popstate', (e) => {
                        if (e.state?.view) {
                            this.view = e.state.view;
                            if (this.currentUser) this.loadData();
                        } else if (this.currentUser) {
                            this.goHome();
                        } else {
                            this.view = 'login';
                        }
                    });

                    const saved = localStorage.getItem('dwali_user');
                    if (saved) {
                        try {
                            this.currentUser = JSON.parse(saved);
                            const v = localStorage.getItem('dwali_view') ||
                                (this.currentUser.role === 'admin' ? 'admin-dashboard' : 'student-dashboard');
                            this.view = v;
                            // Load data di background
                            setTimeout(() => this.loadData(), 100);
                        } catch (_) { localStorage.removeItem('dwali_user'); }
                    }
                },

                // ------------------------------------------------------
                // NAVIGASI
                // ------------------------------------------------------
                navigateTo(view) {
                    this.navHistory.push(this.view);
                    this.view = view;
                    history.pushState({ view }, '', `#${view}`);
                    localStorage.setItem('dwali_view', view);
                    if (this.currentUser) {
                        // Load data dengan delay kecil agar UI cepat
                        setTimeout(() => this.loadData(), 50);
                    }
                },

                goBack() {
                    if (this.navHistory.length) {
                        const prev = this.navHistory.pop();
                        this.view = prev;
                        history.back();
                    } else {
                        this.goHome();
                    }
                },

                goHome() {
                    if (!this.currentUser) {
                        this.view = 'login';
                        history.pushState({ view: 'login' }, '', '#login');
                        return;
                    }
                    const home = this.currentUser.role === 'admin' ? 'admin-dashboard' : 'student-dashboard';
                    this.navHistory = [];
                    this.view = home;
                    history.pushState({ view: home }, '', `#${home}`);
                    localStorage.setItem('dwali_view', home);
                    this.loadData();
                },

                showToast(msg) {
                    this.toast.msg = msg;
                    this.toast.show = true;
                    clearTimeout(this._toastTimer);
                    this._toastTimer = setTimeout(() => this.toast.show = false, 3000);
                },

                // ------------------------------------------------------
                // LOAD DATA dengan progress
                // ------------------------------------------------------
                async loadData() {
                    if (!this.currentUser || this.isLoading) return;
                    
                    this.isLoading = true;
                    this.loadingProgress = 0;
                    this.loadingMessage = 'Menghubungi server...';
                    
                    try {
                        const tasks = [];
                        let totalTasks = 0;
                        
                        if (this.currentUser.role === 'admin') {
                            tasks.push(
                                { fn: this.loadStudents.bind(this), name: 'Memuat data siswa' },
                                { fn: this.loadCurhats.bind(this), name: 'Memuat data curhat' }
                            );
                            totalTasks = 2;
                        } else {
                            tasks.push(
                                { fn: this.loadMyJurnals.bind(this), name: 'Memuat jurnal' },
                                { fn: this.loadMyCurhats.bind(this), name: 'Memuat curhat' },
                                { fn: this.loadPotensi.bind(this), name: 'Memuat potensi' },
                                { fn: this.loadPerbuatanBaik.bind(this), name: 'Memuat perbuatan baik' }
                            );
                            totalTasks = 4;
                        }
                        
                        let completed = 0;
                        for (const task of tasks) {
                            this.loadingMessage = task.name + '...';
                            await task.fn();
                            completed++;
                            this.loadingProgress = Math.round((completed / totalTasks) * 100);
                        }
                        
                        this.loadingProgress = 100;
                        this.loadingMessage = 'Selesai! ✅';
                        
                        // Sembunyikan loading setelah 300ms
                        await new Promise(r => setTimeout(r, 300));
                        
                    } catch (e) {
                        console.error('❌ Load error:', e);
                        this.showToast('⚠️ ' + (e.message || 'Gagal memuat data'));
                    } finally {
                        this.isLoading = false;
                    }
                },

                // ------------------------------------------------------
                // AUTH
                // ------------------------------------------------------
                async studentLogin() {
                    this.isLoading = true;
                    this.loadingMessage = 'Memverifikasi akun...';
                    this.loadingProgress = 30;
                    
                    try {
                        const result = await callAPI('loginStudent', {
                            name: this.loginForm.name,
                            class: this.loginForm.class,
                            password: this.loginForm.password
                        });
                        this.loadingProgress = 70;
                        this.currentUser = result;
                        localStorage.setItem('dwali_user', JSON.stringify(result));
                        this.loadingProgress = 100;
                        this.loadingMessage = 'Login berhasil!';
                        await new Promise(r => setTimeout(r, 300));
                        this.navigateTo('student-dashboard');
                        this.showToast('✅ Login berhasil!');
                    } catch (e) {
                        alert('❌ ' + (e.message || 'Nama/Kelas/Password salah!'));
                        this.isLoading = false;
                    }
                },

                async adminLogin() {
                    this.isLoading = true;
                    this.loadingMessage = 'Memverifikasi akun...';
                    this.loadingProgress = 30;
                    
                    try {
                        const result = await callAPI('loginAdmin', {
                            email: this.loginForm.email,
                            password: this.loginForm.password
                        });
                        this.loadingProgress = 70;
                        this.currentUser = result;
                        localStorage.setItem('dwali_user', JSON.stringify(result));
                        this.initLaporanForm();
                        this.loadingProgress = 100;
                        this.loadingMessage = 'Login berhasil!';
                        await new Promise(r => setTimeout(r, 300));
                        this.navigateTo('admin-dashboard');
                        this.showToast('✅ Selamat datang, Wali!');
                    } catch (e) {
                        alert('❌ ' + (e.message || 'Email/Password salah!'));
                        this.isLoading = false;
                    }
                },

                logout() {
                    if (!confirm('Yakin mau logout?')) return;
                    this.currentUser = null;
                    this.view = 'login';
                    this.navHistory = [];
                    localStorage.removeItem('dwali_user');
                    localStorage.removeItem('dwali_view');
                    this.cachedStudents = [];
                    this.cachedCurhats = [];
                    history.pushState({ view: 'login' }, '', '#login');
                    this.showToast('👋 Logout berhasil');
                },

                // ------------------------------------------------------
                // PETA POTENSI
                // ------------------------------------------------------
                async savePotensi() {
                    this.isLoading = true;
                    this.loadingMessage = 'Menyimpan peta potensi...';
                    try {
                        await callAPI('savePotensi', { student_id: this.currentUser.id, ...this.potensiForm });
                        this.currentUser.is_potensi_filled = true;
                        localStorage.setItem('dwali_user', JSON.stringify(this.currentUser));
                        this.showToast('✅ Peta Potensi tersimpan! 🗺️');
                        await this.loadData();
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                async loadPotensi() {
                    try {
                        this.cachedPotensi = await callAPI('getPotensi', { student_id: this.currentUser.id }) || [];
                    } catch (_) { this.cachedPotensi = []; }
                },

                // ------------------------------------------------------
                // PERBUATAN BAIK
                // ------------------------------------------------------
                openGoodAction() {
                    if (this.hasDoneGoodToday()) {
                        this.showToast('🌟 Kamu sudah mengisi perbuatan baik hari ini. Hebat!');
                        return;
                    }
                    this.modalGoodAction = true;
                },

                hasDoneGoodToday() {
                    const today = new Date().toISOString().split('T')[0];
                    return this.cachedPerbuatanBaik.some(p => p.student_id === this.currentUser.id && p.date === today);
                },

                async submitGoodAction(action) {
                    const today = new Date().toISOString().split('T')[0];
                    this.isLoading = true;
                    this.loadingMessage = 'Menyimpan perbuatan baik...';
                    try {
                        await callAPI('savePerbuatanBaik', { student_id: this.currentUser.id, action, date: today });
                        this.modalGoodAction = false;
                        this.cachedPerbuatanBaik.push({ student_id: this.currentUser.id, action, date: today });
                        const msgs = ['🌟 Good Job! Kamu hebat!', '💪 Luar biasa! Pertahankan!', '😇 Kamu anak baik!'];
                        this.showToast(msgs[Math.floor(Math.random() * msgs.length)]);
                        await this.loadPerbuatanBaik();
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                async loadPerbuatanBaik() {
                    try {
                        this.cachedPerbuatanBaik = await callAPI('getPerbuatanBaik', { student_id: this.currentUser
                            .id }) || [];
                    } catch (_) { this.cachedPerbuatanBaik = []; }
                },

                // ------------------------------------------------------
                // CURHAT
                // ------------------------------------------------------
                setCurhat(field, value) {
                    this.curhatForm[field] = value;
                },

                async submitCerita() {
                    if (!this.tempCerita.trim()) return alert('Cerita tidak boleh kosong');
                    this.curhatForm.cerita = this.tempCerita;
                    this.isLoading = true;
                    this.loadingMessage = 'Mengirim curhat...';
                    try {
                        await callAPI('saveCurhat', {
                            id: 'c' + Date.now(),
                            student_id: this.currentUser.id,
                            ...this.curhatForm,
                            created_at: new Date().toISOString()
                        });
                        this.tempCerita = '';
                        this.showToast('✅ Terima kasih sudah curhat.');
                        setTimeout(() => this.goHome(), 2500);
                        await this.loadMyCurhats();
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                getMyCurhats() {
                    return (this.cachedCurhats || []).filter(c => c.student_id === this.currentUser.id)
                        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                },

                async loadMyCurhats() {
                    try {
                        this.cachedCurhats = await callAPI('getCurhats', { student_id: this.currentUser.id }) || [];
                    } catch (_) { this.cachedCurhats = []; }
                },

                // ------------------------------------------------------
                // JURNAL
                // ------------------------------------------------------
                async saveJurnal() {
                    if (!this.jurnalForm.perasaan || !this.jurnalForm.cerita) {
                        return alert('Lengkapi perasaan dan cerita');
                    }
                    const today = new Date().toISOString().split('T')[0];
                    this.isLoading = true;
                    this.loadingMessage = 'Menyimpan jurnal...';
                    try {
                        await callAPI('saveJurnal', { student_id: this.currentUser.id, ...this.jurnalForm, date: today });
                        this.jurnalForm = { perasaan: '', cerita: '' };
                        this.showToast('📔 Jurnal harian tersimpan!');
                        await this.loadMyJurnals();
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                getMyJurnals() {
                    return (this.cachedJurnals || []).filter(j => j.student_id === this.currentUser.id)
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                },

                async loadMyJurnals() {
                    try {
                        this.cachedJurnals = await callAPI('getJurnals', { student_id: this.currentUser.id }) || [];
                    } catch (_) { this.cachedJurnals = []; }
                },

                // ------------------------------------------------------
                // ADMIN: SISWA
                // ------------------------------------------------------
                getMyStudents() {
                    if (!this.currentUser) return [];
                    return (this.cachedStudents || []).filter(s => s.wali_id === this.currentUser.id);
                },

                async loadStudents() {
                    if (!this.currentUser) return;
                    try {
                        this.cachedStudents = await callAPI('getStudents', { wali_id: this.currentUser.id }) || [];
                        this.initLaporanForm();
                    } catch (_) { this.cachedStudents = []; }
                },

                async addStudent() {
                    if (!this.newStudent.name || !this.newStudent.nis) return alert('Nama dan NIS wajib diisi');
                    this.isLoading = true;
                    this.loadingMessage = 'Menambahkan siswa...';
                    try {
                        await callAPI('addStudent', {
                            id: 's' + Date.now(),
                            nis: this.newStudent.nis,
                            name: this.newStudent.name,
                            wali_id: this.currentUser.id,
                            class: this.currentUser.class
                        });
                        this.newStudent = { name: '', nis: '' };
                        this.showToast('✅ Siswa berhasil ditambahkan!');
                        await this.loadStudents();
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                async resetPassword(id) {
                    if (!confirm('Reset password siswa ke default (siswa123)?')) return;
                    this.isLoading = true;
                    this.loadingMessage = 'Mereset password...';
                    try {
                        await callAPI('resetPassword', { student_id: id });
                        this.showToast('✅ Password direset!');
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                async deleteStudent(id) {
                    if (!confirm('Yakin hapus siswa ini?')) return;
                    this.isLoading = true;
                    this.loadingMessage = 'Menghapus siswa...';
                    try {
                        await callAPI('deleteStudent', { student_id: id });
                        this.showToast('✅ Siswa dihapus.');
                        await this.loadStudents();
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                getStudentStatusColor(id) {
                    const curhats = (this.cachedCurhats || []).filter(c => c.student_id === id && !c.balasan);
                    if (curhats.some(c => c.tingkat_darurat === 'Aku butuh bantuan sekarang')) return 'bg-dwali-red';
                    if (curhats.length) return 'bg-dwali-yellow';
                    return 'bg-dwali-success';
                },

                // ------------------------------------------------------
                // ADMIN: CURHAT
                // ------------------------------------------------------
                getAdminCurhats() {
                    const ids = this.getMyStudents().map(s => s.id);
                    return (this.cachedCurhats || []).filter(c => ids.includes(c.student_id))
                        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                },

                async loadCurhats() {
                    if (!this.currentUser) return;
                    try {
                        this.cachedCurhats = await callAPI('getCurhats', { wali_id: this.currentUser.id }) || [];
                    } catch (_) { this.cachedCurhats = []; }
                },

                getStudentName(id) {
                    const s = this.cachedStudents.find(st => st.id === id);
                    return s ? s.name : 'Unknown';
                },

                async replyCurhat(curhatId) {
                    const reply = this.replyText[curhatId];
                    if (!reply) return alert('Balasan tidak boleh kosong');
                    this.isLoading = true;
                    this.loadingMessage = 'Mengirim balasan...';
                    try {
                        await callAPI('replyCurhat', { curhat_id: curhatId, balasan: reply, balasan_at: new Date()
                                .toISOString() });
                        this.replyText[curhatId] = '';
                        this.showToast('✅ Balasan terkirim!');
                        await this.loadCurhats();
                    } catch (e) {
                        alert('❌ ' + e.message);
                    } finally {
                        this.isLoading = false;
                    }
                },

                countCurhatByStatus(type) {
                    const list = this.getAdminCurhats().filter(c => !c.balasan);
                    if (type === 'emergency') return list.filter(c => c.tingkat_darurat === 'Aku butuh bantuan sekarang')
                        .length;
                    if (type === 'normal') return list.filter(c => c.tingkat_darurat !== 'Aku butuh bantuan sekarang')
                        .length;
                    return 0;
                },

                // ------------------------------------------------------
                // ADMIN: LAPORAN
                // ------------------------------------------------------
                initLaporanForm() {
                    this.getMyStudents().forEach(std => {
                        if (!this.laporanForm[std.id]) {
                            this.laporanForm[std.id] = { nilai_akademik: 70, sikap: 'Baik', catatan_khusus: '' };
                        }
                    });
                },

                exportExcel() {
                    const data = [];
                    this.getMyStudents().forEach(std => {
                        const pot = this.cachedPotensi.find(p => p.student_id === std.id) || {};
                        const baik = this.cachedPerbuatanBaik.filter(p => p.student_id === std.id).length;
                        const jrnl = this.cachedJurnals.filter(j => j.student_id === std.id).length;
                        const lap = this.laporanForm[std.id] || {};
                        data.push({
                            'NIS': std.nis,
                            'Nama Siswa': std.name,
                            'Kelas': std.class,
                            'Minat': pot.minat || '-',
                            'Gaya Belajar': pot.gaya_belajar || '-',
                            'Cita-cita': pot.cita_cita || '-',
                            'Kekuatan Karakter': pot.kekuatan_karakter || '-',
                            'Ekstrakurikuler': pot.ekstrakurikuler || '-',
                            'Nilai Akademik': lap.nilai_akademik || 0,
                            'Sikap': lap.sikap || '-',
                            'Catatan Khusus': lap.catatan_khusus || '-',
                            'Total Perbuatan Baik': baik,
                            'Total Jurnal': jrnl
                        });
                    });
                    const ws = XLSX.utils.json_to_sheet(data);
                    ws['!cols'] = Object.keys(data[0] || {}).map(() => ({ wpx: 120 }));
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, 'Laporan Siswa');
                    XLSX.writeFile(wb, 'Laporan_DWali.xlsx');
                    this.showToast('📥 Excel berhasil diunduh!');
                },

                // ------------------------------------------------------
                // HELPER
                // ------------------------------------------------------
                formatDate(dateStr) {
                    if (!dateStr) return '-';
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('id-ID', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            };
        }
    </script>

</body>
</html>
